<!DOCTYPE html>
<html>
<head>
    <title>Create Default Avatar</title>
</head>
<style>
.chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10000;
}
.chat-button {
    width: 65px;
    height: 65px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
}
.chat-button:hover {
    transform: scale(1.1);
}
.chat-button i {
    color: white;
    font-size: 28px;
}
.chat-window {
    position: fixed;
    bottom: 95px;
    right: 20px;
    width: 400px;
    height: 550px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.chat-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
}
.chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #f5f5f5;
}
.chat-input-container {
    padding: 15px;
    background: white;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 10px;
}
.chat-input-container input {
    flex: 1;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 25px;
    outline: none;
    font-size: 14px;
}
.chat-input-container input:focus {
    border-color: #667eea;
}
.chat-input-container button {
    padding: 12px 25px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s;
}
.chat-input-container button:hover {
    transform: scale(1.05);
}
.message {
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 18px;
    max-width: 85%;
    word-wrap: break-word;
    line-height: 1.4;
    font-size: 14px;
}
.user-message {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 5px;
}
.bot-message {
    background: white;
    color: #333;
    margin-right: auto;
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
.typing {
    background: white;
    padding: 10px 14px;
    border-radius: 18px;
    display: inline-block;
}
.typing span {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #999;
    margin: 0 2px;
    animation: typingAnim 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingAnim {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-10px); opacity: 1; }
}
</style>
<div class="chat-widget">
    <div class="chat-button" onclick="toggleChat()">
        <i class="fas fa-robot"></i>
    </div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <span>🤖 AI Помощник Эксперт Сервис</span>
            <span style="cursor:pointer" onclick="toggleChat()">✕</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                👋 Здравствуйте! Я AI-помощник сервиса "Эксперт Сервис".<br>
                Задавайте любые вопросы! 😊
            </div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">📤 Отправить</button>
        </div>
    </div>
</div>
<body>
    <canvas id="canvas" width="100" height="100"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Draw background
        ctx.fillStyle = '#667eea';
        ctx.fillRect(0, 0, 100, 100);
        
        // Draw circle
        ctx.fillStyle = '#764ba2';
        ctx.beginPath();
        ctx.arc(50, 50, 50, 0, 2 * Math.PI);
        ctx.fill();
        
        // Draw user icon
        ctx.fillStyle = 'white';
        ctx.font = '50px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('👤', 50, 55);
        
        // Download as PNG
        const link = document.createElement('a');
        link.download = 'default-avatar.png';
        link.href = canvas.toDataURL();
        link.click();
    </script>
</body>
</html>
