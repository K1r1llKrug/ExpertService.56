<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель мастера - Эксперт Сервис</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .dashboard-header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .requests-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        .requests-table th,
        .requests-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .requests-table th {
            background: #f8f9fa;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .status-new { background: #f39c12; color: white; }
        .status-in_progress { background: #3498db; color: white; }
        .status-completed { background: #2ecc71; color: white; }
        .status-cancelled { background: #e74c3c; color: white; }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.85rem;
            border-radius: 5px;
            border: 1px solid #ddd;
            cursor: pointer;
        }
        .reviews-section {
            margin-top: 40px;
        }
        .review-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .master-response {
            margin-top: 15px;
            padding: 15px;
            background: #f0f7ff;
            border-left: 4px solid #3498db;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1><i class="fas fa-tools"></i> Эксперт Сервис</h1>
                <p>Панель мастера</p>
            </div>
            <nav>
                <a href="/index.html"><i class="fas fa-home"></i> На сайт</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1><i class="fas fa-user-cog"></i> Добро пожаловать, Мастер!</h1>
                <p>Управляйте заявками и отвечайте на отзывы клиентов</p>
            </div>

            <div class="requests-section">
                <h2><i class="fas fa-clipboard-list"></i> Активные заявки</h2>
                <div id="requestsList"></div>
            </div>

            <div class="reviews-section">
                <h2><i class="fas fa-star"></i> Отзывы клиентов</h2>
                <div id="reviewsList"></div>
            </div>
        </div>
    </main>

    <script>
        // Logout
        document.getElementById('logoutBtn').onclick = async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        };

        // Load requests
        async function loadRequests() {
            try {
                const res = await fetch('/api/requests');
                const requests = await res.json();
                
                const html = `
                    <table class="requests-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Клиент</th>
                                <th>Телефон</th>
                                <th>Услуга</th>
                                <th>Описание</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${requests.map(r => `
                                <tr>
                                    <td>${r.id}</td>
                                    <td>${escapeHtml(r.name)}</td>
                                    <td>${escapeHtml(r.phone)}</td>
                                    <td>${escapeHtml(r.service)}</td>
                                    <td>${escapeHtml(r.description || '—')}</td>
                                    <td><span class="status-badge status-${r.status}">${getStatusText(r.status)}</span></td>
                                    <td>
                                        <select onchange="updateRequestStatus(${r.id}, this.value)" class="btn-sm">
                                            <option value="new" ${r.status === 'new' ? 'selected' : ''}>Новая</option>
                                            <option value="in_progress" ${r.status === 'in_progress' ? 'selected' : ''}>В работе</option>
                                            <option value="completed" ${r.status === 'completed' ? 'selected' : ''}>Выполнена</option>
                                            <option value="cancelled" ${r.status === 'cancelled' ? 'selected' : ''}>Отменена</option>
                                        </select>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                
                document.getElementById('requestsList').innerHTML = html;
            } catch (err) {
                document.getElementById('requestsList').innerHTML = '<p>Ошибка загрузки заявок</p>';
            }
        }

        // Load reviews
        async function loadReviews() {
            try {
                const res = await fetch('/api/reviews');
                const reviews = await res.json();
                
                const html = reviews.map(r => `
                    <div class="review-card">
                        <div class="review-header">
                            <strong>${escapeHtml(r.user_name)}</strong>
                            <div class="rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                        </div>
                        <p>${escapeHtml(r.comment)}</p>
                        <small>${new Date(r.created_at).toLocaleDateString()}</small>
                        ${r.master_response ? `
                            <div class="master-response">
                                <strong><i class="fas fa-reply"></i> Ваш ответ:</strong>
                                <p>${escapeHtml(r.master_response)}</p>
                            </div>
                        ` : `
                            <div style="margin-top: 15px;">
                                <textarea id="response-${r.id}" placeholder="Ответить на отзыв..." rows="3" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
                                <button onclick="addReviewResponse(${r.id})" class="btn-primary" style="margin-top: 10px;">Ответить</button>
                            </div>
                        `}
                    </div>
                `).join('');
                
                document.getElementById('reviewsList').innerHTML = html || '<p>Нет отзывов</p>';
            } catch (err) {
                document.getElementById('reviewsList').innerHTML = '<p>Ошибка загрузки отзывов</p>';
            }
        }

        window.updateRequestStatus = async (id, status) => {
            try {
                const res = await fetch(`/api/requests/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (res.ok) {
                    alert('Статус заявки обновлен');
                    loadRequests();
                } else {
                    alert('Ошибка обновления статуса');
                }
            } catch (err) {
                alert('Ошибка');
            }
        };

        window.addReviewResponse = async (reviewId) => {
            const response = document.getElementById(`response-${reviewId}`).value;
            if (!response.trim()) {
                alert('Введите ответ');
                return;
            }
            
            try {
                const res = await fetch(`/api/reviews/${reviewId}/response`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ response })
                });
                
                if (res.ok) {
                    alert('Ответ добавлен');
                    loadReviews();
                } else {
                    alert('Ошибка');
                }
            } catch (err) {
                alert('Ошибка');
            }
        };

        function getStatusText(status) {
            const texts = { new: 'Новая', in_progress: 'В работе', completed: 'Выполнена', cancelled: 'Отменена' };
            return texts[status] || status;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Initialize
        loadRequests();
        loadReviews();
    </script>
</body>
</html>
